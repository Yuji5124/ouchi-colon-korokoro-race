<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Ouchi Colon ころころレース</title>
<style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#1a1727;font-family:monospace}.frame{width:min(100vw,430px);padding:10px;background:#2e2644;border:4px solid #6f6098;border-radius:12px}canvas{width:390px;height:844px;max-width:100%;display:block;border:4px solid #140f20;image-rendering:pixelated;touch-action:none}
</style>
</head>
<body><div class="frame"><canvas id="game" width="390" height="844"></canvas></div>
<script>
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
const W=390,H=844,pix=2,lanes=[-0.62,-0.22,0.22,0.62],keys={left:false,right:false};
const state={mode:'title',lap:1,score:0,distance:0,speed:1.2,maxDistance:3200,playerX:0,steer:0,selectedCharacter:0,selectedCourse:0,enemyX:0,enemyDrift:0,time:0,raceTimer:0,items:[],obstacles:[],sparkles:[],hitTimer:0,shake:0,result:'GOAL!'};
function resetRace(){Object.assign(state,{lap:1,score:0,distance:0,speed:1.2,playerX:0,steer:0,enemyX:0,enemyDrift:0,raceTimer:0,items:[],obstacles:[],sparkles:[],hitTimer:0,shake:0});spawnTrackObjects();}
function spawnTrackObjects(){for(let z=220;z<state.maxDistance;z+=120){if(Math.random()<0.72)state.items.push({z,lane:lanes[(Math.random()*lanes.length)|0],got:false});if(Math.random()<0.45)state.obstacles.push({z:z+55,lane:lanes[(Math.random()*lanes.length)|0],hit:false});}}
function jumpEffect(){}
function project(x,z){const horizon=250,camZ=36,depth=Math.max(.001,(z-camZ)/300),s=1/depth;return{x:W*.5+x*s*W*.48,y:horizon+(1-s*.2)*H*.66,scale:s};}
function update(dt){state.time+=dt;if(state.mode!=='race')return;state.raceTimer+=dt;state.enemyDrift+=dt*.7;state.enemyX=Math.sin(state.enemyDrift)*.55;const steer=(keys.left?-1:0)+(keys.right?1:0);state.steer=steer;state.playerX=Math.max(-.8,Math.min(.8,state.playerX+steer*dt*1.8));state.speed=Math.min(4.8,Math.max(.8,state.speed+.08*dt));state.distance+=state.speed*46*dt;state.lap=Math.min(3,1+((state.distance/(state.maxDistance/3))|0));if(state.hitTimer>0)state.hitTimer-=dt;state.shake=Math.max(0,state.shake-dt*8);
for(const s of state.items){if(s.got)continue;const dz=s.z-state.distance;if(dz>0&&dz<45&&Math.abs(s.lane-state.playerX)<.16){s.got=true;state.score++;state.speed=Math.min(5.2,state.speed+.22);for(let i=0;i<18;i++)state.sparkles.push({t:.65+Math.random()*.45,x:W*.5+(Math.random()-.5)*90,y:H-220+(Math.random()-.5)*80,vx:(Math.random()-.5)*50,vy:(Math.random()-.5)*40});}}
for(const ob of state.obstacles){if(ob.hit)continue;const dz=ob.z-state.distance;if(dz>0&&dz<42&&Math.abs(ob.lane-state.playerX)<.2){ob.hit=true;state.speed=Math.max(.7,state.speed*.72);state.hitTimer=.35;state.shake=1;}}
for(const p of state.sparkles){p.t-=dt;p.x+=p.vx*dt;p.y+=p.vy*dt;}state.sparkles=state.sparkles.filter(p=>p.t>0);
if(state.distance>=state.maxDistance){state.mode='goal';state.result='GOAL!';}
if(state.raceTimer>85){state.mode='gameOver';state.result='TIME UP';}}
function r(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect((x/pix|0)*pix,(y/pix|0)*pix,(w/pix|0)*pix,(h/pix|0)*pix);} 
function drawScreenShake(){if(state.shake<=0)return;const s=state.shake*6;ctx.translate((Math.random()-.5)*s,(Math.random()-.5)*s);} 
function drawWallpaper(){r(0,0,W,290,'#ffe9d1');for(let y=22;y<280;y+=28)for(let x=14;x<W;x+=28){const m=(x+y)%4;const c=['#ffd98f','#9bc9ff','#ffb4b4','#9de0a4'][m];if(m===0)r(x,y,8,8,c);if(m===1){ctx.fillStyle=c;ctx.beginPath();ctx.arc(x+4,y+4,4,0,6.28);ctx.fill();}if(m===2){ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(x+4,y);ctx.lineTo(x+8,y+4);ctx.lineTo(x+4,y+8);ctx.lineTo(x,y+4);ctx.closePath();ctx.fill();}if(m===3){r(x+2,y+2,4,4,c);}}}
function drawWindowAndCurtains(){r(26,104,90,112,'#7cc7ff');r(22,100,98,120,'#9b6a39');r(66,104,4,112,'#9b6a39');r(26,156,90,4,'#9b6a39');r(10,98,28,126,'#f58fa0');r(102,98,28,126,'#f58fa0');r(20,154,16,10,'#de6b87');r(104,154,16,10,'#de6b87');}
function drawSofa(){r(130,200,132,66,'#2f9fe0');r(148,178,96,34,'#41afea');r(130,220,20,46,'#268cca');r(242,220,20,46,'#268cca');ctx.fillStyle='#ffd44d';ctx.beginPath();ctx.arc(204,229,16,0,6.28);ctx.fill();}
function drawBookshelf(){r(284,142,92,132,'#c18447');for(let i=0;i<4;i++)r(294,156+i*24,72,12,['#a0db84','#8eb5ff','#f4accc','#ffd56a'][i]);r(290,238,78,24,'#c98d52');r(300,242,26,14,'#8ed36f');r(332,242,26,14,'#f4b96c');}
function drawPlantsAndToys(){r(0,260,W,30,'#c08d5a');r(8,222,44,44,'#cb7a37');ctx.fillStyle='#34b050';ctx.beginPath();ctx.ellipse(30,214,22,20,0,0,6.28);ctx.fill();r(46,238,28,24,'#8ec7ff');r(78,240,24,22,'#ff6b7e');ctx.fillStyle='#59a9ff';ctx.beginPath();ctx.arc(114,250,12,0,6.28);ctx.fill();r(318,246,52,20,'#f8c258');r(326,230,34,18,'#e45757');r(334,252,18,14,'#67b2ff');}
function drawWoodFloor(){r(0,290,W,H-290,'#b77a42');for(let y=292;y<H;y+=22)r(0,y,W,2,'#a56734');for(let x=0;x<W;x+=26)r(x,290,2,H-290,'#c48852');}
function drawPerspectiveTrack(){const h=292;for(let y=h;y<H;y+=4){const t=(y-h)/(H-h),half=62+t*158,cx=W*.5,l=cx-half,ri=cx+half;r(l,y,ri-l,4,((y+state.distance)/16|0)%2?'#bb7d45':'#ad6f3d');r(l-11,y,11,4,((y/10|0)%2)?'#fff':'#ff7a84');r(ri,y,11,4,((y/10|0)%2)?'#fff':'#ff7a84');if((y/20|0)%2===0)r(cx-2,y,4,4,'#f9e0be');}}
function drawRoomBackground(){drawWallpaper();drawWindowAndCurtains();drawSofa();drawBookshelf();drawPlantsAndToys();drawWoodFloor();}
function drawCourse(){drawRoomBackground();drawPerspectiveTrack();}
function drawRaceLogo(){r(W/2-120,8,240,58,'#fff');r(W/2-116,12,232,50,'#f9fdff');ctx.fillStyle='#2f74b6';ctx.font='bold 14px monospace';ctx.fillText('Ouchi Colon',W/2-50,30);const txt='ころころレース';const cols=['#ff6464','#ffbe3d','#49a5ff','#5fcf59','#ff6464','#ffbe3d','#49a5ff'];ctx.font='bold 28px monospace';for(let i=0;i<txt.length;i++){ctx.fillStyle='black';ctx.fillText(txt[i],W/2-96+i*28+2,57+2);ctx.fillStyle=cols[i%cols.length];ctx.fillText(txt[i],W/2-96+i*28,57);}}
function drawLargeLapHud(){ctx.font='bold 30px monospace';ctx.fillStyle='black';ctx.fillText(`LAP`,16,46);ctx.fillText(`${state.lap}/3`,16,80);ctx.fillStyle='white';ctx.fillText(`LAP`,12,42);ctx.fillText(`${state.lap}/3`,12,76);} 
function drawLargeStarHud(){ctx.font='bold 28px monospace';ctx.fillStyle='black';ctx.fillText(`★ x ${String(state.score).padStart(2,'0')}`,W-148,48);ctx.fillStyle='white';ctx.fillText(`★ x ${String(state.score).padStart(2,'0')}`,W-152,44);} 
function drawStar(x,y,s){ctx.fillStyle='#ff9a24';ctx.beginPath();for(let i=0;i<10;i++){const a=-1.57+i*.628,r=i%2?s:s*.45;ctx[i?'lineTo':'moveTo'](x+Math.cos(a)*r,y+Math.sin(a)*r);}ctx.closePath();ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.stroke();ctx.fillStyle='#ffd84d';ctx.beginPath();for(let i=0;i<10;i++){const a=-1.57+i*.628,r=i%2?s*.8:s*.36;ctx[i?'lineTo':'moveTo'](x+Math.cos(a)*r,y+Math.sin(a)*r);}ctx.closePath();ctx.fill();}
function drawToyBlock(x,y,s,c1,c2){const w=24*s,h=20*s;r(x-w/2,y-h,w,h,c1);r(x-w/2+3,y-h+3,w-6,h-6,c2);ctx.fillStyle='rgba(255,255,255,.25)';r(x-w/2+4,y-h+4,w-14,5,ctx.fillStyle);ctx.fillStyle='#ffdbe0';ctx.font=`${Math.max(8,8*s)}px monospace`;ctx.fillText('★',x-4*s,y-6*s);} 
function drawObstacle(x,y,s){drawToyBlock(x,y,s,'#df4364','#2e9cf1');}
function drawMoolo(){if(state.mode!=='race')return;const p=project(state.enemyX,150),s=Math.max(1,Math.min(1.8,p.scale*1.8));ctx.strokeStyle='#102812';ctx.lineWidth=4*s;ctx.fillStyle='#53d25f';ctx.beginPath();ctx.arc(p.x,p.y-22*s,20*s,0,6.28);ctx.fill();ctx.stroke();r(p.x-13*s,p.y-28*s,26*s,12*s,'#14202a');r(p.x-8*s,p.y-24*s,5*s,4*s,'#effaff');r(p.x+3*s,p.y-24*s,5*s,4*s,'#effaff');r(p.x-20*s,p.y-5*s,10*s,10*s,'#292f38');r(p.x+10*s,p.y-5*s,10*s,10*s,'#292f38');}
function drawMikaro(){const bob=Math.sin(state.time*9)*4,y=H-132+bob,x=W*.5+state.playerX*120,blink=state.hitTimer>0&&((state.time*24|0)%2===0);if(blink)return;ctx.strokeStyle='#2b2012';ctx.lineWidth=8;r(x-62,y-18,22,32,'#24242f');r(x+40,y-18,22,32,'#24242f');ctx.fillStyle='#ffd22f';ctx.beginPath();ctx.arc(x,y-18,48,0,6.28);ctx.fill();ctx.stroke();ctx.fillStyle='#ffe784';ctx.beginPath();ctx.arc(x-12,y-34,14,0,6.28);ctx.fill();ctx.fillStyle='#2d2a1f';ctx.beginPath();ctx.arc(x,y-8,17,0,6.28);ctx.fill();ctx.fillStyle='#f7b029';ctx.font='bold 18px monospace';ctx.fillText('8',x-6,y-2);r(x-30,y-60,15,15,'#73cbff');r(x+15,y-60,15,15,'#73cbff');r(x-18,y+22,36,10,'#252525');r(x-16,y+24,10,6,'#ff5858');r(x+6,y+24,10,6,'#ff5858');}
function drawSparkleEffect(){for(const p of state.sparkles){const a=Math.min(1,p.t/.6);ctx.strokeStyle=`rgba(255,245,170,${a})`;ctx.lineWidth=2;ctx.beginPath();ctx.arc(p.x,p.y,(1-a)*12+6,0,6.28);ctx.stroke();r(p.x-1,p.y-6,2,12,`rgba(255,255,255,${a})`);r(p.x-6,p.y-1,12,2,`rgba(255,255,255,${a})`);} }
function drawMiniMap(){r(16,H-204,120,140,'#1b2435cc');ctx.strokeStyle='#fff';ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(44,H-54);ctx.bezierCurveTo(8,H-110,30,H-170,84,H-182);ctx.bezierCurveTo(122,H-176,130,H-108,98,H-82);ctx.bezierCurveTo(70,H-62,78,H-36,44,H-54);ctx.stroke();const p=Math.min(1,state.distance/state.maxDistance);ctx.fillStyle='#56a9ff';ctx.beginPath();ctx.arc(36+p*58,H-66-p*90,5,0,6.28);ctx.fill();ctx.fillStyle='#ff6d8a';ctx.beginPath();ctx.arc(36+((Math.sin(state.enemyDrift)*.5+.5)*58),H-74,5,0,6.28);ctx.fill();}
function drawSpeedMeter(){r(W-170,H-190,154,126,'#1b2435cc');const sp=String((state.speed*30|0)).padStart(3,'0');ctx.fillStyle='black';ctx.font='bold 58px monospace';ctx.fillText(sp,W-164,H-114);ctx.fillStyle='white';ctx.fillText(sp,W-168,H-118);ctx.font='bold 22px monospace';ctx.fillText('km/h',W-66,H-112);const x=W-158,y=H-96,w=128,h=20;r(x,y,w,h,'#24324b');const ratio=Math.min(1,state.speed/5.2),fw=w*ratio;const grad=ctx.createLinearGradient(x,0,x+w,0);grad.addColorStop(0,'#73df66');grad.addColorStop(.45,'#f2e640');grad.addColorStop(.8,'#ff9b2d');grad.addColorStop(1,'#ff5b5b');ctx.fillStyle=grad;ctx.fillRect(x,y,fw,h);ctx.strokeStyle='#101010';ctx.lineWidth=3;ctx.strokeRect(x,y,w,h);} 
function drawHUD(){drawRaceLogo();drawLargeLapHud();drawLargeStarHud();drawMiniMap();drawSpeedMeter();}
function drawTrackObjects(){for(const s of state.items){if(s.got)continue;const dz=s.z-state.distance;if(dz<20||dz>420)continue;const p=project(s.lane,dz+60),sz=Math.max(8,Math.min(18,p.scale*48));drawStar(p.x,p.y-sz,sz);}for(const ob of state.obstacles){if(ob.hit)continue;const dz=ob.z-state.distance;if(dz<20||dz>420)continue;const p=project(ob.lane,dz+60),sz=Math.max(.9,Math.min(2.6,p.scale*5.4));drawObstacle(p.x,p.y,sz);}}
function drawMenu(t,s,h){drawRoomBackground();r(18,160,W-36,280,'#2d3559dd');ctx.fillStyle='#fff1d8';ctx.font='bold 26px monospace';ctx.fillText(t,34,240);ctx.font='16px monospace';ctx.fillText(s,34,286);ctx.fillStyle='#9fd0ff';ctx.fillText(h,34,334);drawMikaro();}
function draw(){ctx.save();ctx.imageSmoothingEnabled=false;drawScreenShake();if(state.mode==='title'){drawMenu('Ouchi Colon','ころころレース','TAP / ENTER で START');ctx.restore();return;}if(state.mode==='characterSelect'){drawMenu('CHARACTER SELECT','MIKARO を選んでね','← → で選択 / ENTER 決定');ctx.restore();return;}if(state.mode==='courseSelect'){drawMenu('COURSE SELECT','リビング 木の床コース','ENTER で レース開始');ctx.restore();return;}drawCourse();drawTrackObjects();drawMoolo();drawSparkleEffect();drawMikaro();drawHUD();if(state.mode==='goal'||state.mode==='gameOver'){r(34,258,W-68,234,'#0f1427dd');ctx.fillStyle='#fff2d7';ctx.font='bold 30px monospace';ctx.fillText(state.result,108,334);ctx.font='18px monospace';ctx.fillText('SCORE ★ x '+String(state.score).padStart(2,'0'),96,388);ctx.fillText('TAP / ENTER で TITLE へ',76,436);}ctx.restore();}
function handleAdvance(){if(state.mode==='title')state.mode='characterSelect';else if(state.mode==='characterSelect')state.mode='courseSelect';else if(state.mode==='courseSelect'){resetRace();state.mode='race';}else if(state.mode==='goal'||state.mode==='gameOver')state.mode='title';}
function setTouchSteer(clientX){const rect=canvas.getBoundingClientRect(),x=clientX-rect.left;keys.left=x<rect.width/2;keys.right=!keys.left;}
addEventListener('keydown',e=>{if(e.key==='ArrowLeft')keys.left=true;if(e.key==='ArrowRight')keys.right=true;if(e.key==='Enter'||e.key===' ')handleAdvance();});
addEventListener('keyup',e=>{if(e.key==='ArrowLeft')keys.left=false;if(e.key==='ArrowRight')keys.right=false;});
canvas.addEventListener('pointerdown',e=>{if(state.mode!=='race')return handleAdvance();setTouchSteer(e.clientX);});
canvas.addEventListener('pointermove',e=>{if(state.mode==='race'&&e.buttons)setTouchSteer(e.clientX);});
canvas.addEventListener('pointerup',()=>{keys.left=false;keys.right=false;});
let last=performance.now();function loop(now){const dt=Math.min(.033,(now-last)/1e3);last=now;update(dt);draw();requestAnimationFrame(loop);}requestAnimationFrame(loop);
</script></body></html>
